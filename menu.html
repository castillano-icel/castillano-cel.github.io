<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
            
    }
    
    h1 {
      text-align: center;
      border-bottom: 6px double black ;
      font-size: 25px;
      width: 60%;
      margin: auto; 
    }
    
    .menu-box {
      border: 4px solid black;
      border-radius: 15px;
      margin: 20px auto;            
      width: 60%;
    }
    
    .row {
      padding: 12px 15px;
      border-bottom: 1px solid black;
      font-size: 16px;
      
    }
    .row:last-child {
      border-bottom: none;
    }
    
    .day {
      font-weight: bold;
    }
    
    .divider {
      color: #990000;
      margin: 0 8px;
    }
    
    .box {
      border: 2px dashed green;
      color: black;
      padding: 3px 8px;
      display: inline-block;
      border-radius: 4px;
    }
    
    table {
      width: 60%;
      border-collapse: collapse;
      margin: auto;
    }
    
    th {
      border-bottom: 4px solid black;
      text-align: left;
      padding: 8px;
      font-size: 16px;
      font-weight: bold;
    }
    
    td {
      border: 1px solid black;
      padding: 8px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h1>School Cafeteria Weekly Menu</h1>
<div class="menu-box">
  <div class="row">
    <span class="day"><b>Monday</b></span>
    <span class="divider">||</span>
    <span class="box">Fried Chicken</span>
  </div>
  <div class="row">
    <span class="day"><b>Tuesday</b></span>
    <span class="divider">||</span>
    Spaghetti
  </div>
  <div class="row">
    <span class="day"><b>Wednesday</b></span>
    <span class="divider">||</span>
    Burger
  </div>
  <div class="row">
    <span class="day"><b>Thursday</b></span>
    <span class="divider">||</span>
    <span class="box">Grilled fish</span>
  </div>
  <div class="row">
    <span class="day"><b>Friday</b></span>
    <span class="divider">||</span>
    Pizza
  </div>
</div>

<table>
  <tr>
    <th><b>Drink</b></th>
    <th><b>Price</b></th>
  </tr>
  <tr>
    <td>Juice</td>
    <td>₱50</td>
  </tr>
  <tr>
    <td>Soda</td>
    <td>₱75</td>
  </tr>
</table>

</body>
</html>
